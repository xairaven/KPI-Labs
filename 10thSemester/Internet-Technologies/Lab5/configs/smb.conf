[global]
   workgroup = WORKGROUP
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d
   server role = standalone server
   obey pam restrictions = yes
   unix password sync = yes
   passwd program = /usr/bin/passwd %u
   passwd chat = *Enter\snew\s*\spassword:* %n\n *Retype\snew\s*\spassword:* %n\n *password\supdated\ssuccessfully* .
   pam password change = yes
   map to guest = bad user
   usershare allow guests = yes
[homes]
   comment = Home Directories
   browseable = yes
   writable = yes
   create mask = 0666
   directory mask = 0777
   valid users = %S
   invalid users = lynx
   guest ok = no
[hidden]
   path = /smb/hidden
   comment = Hidden Directory
   browseable = no
   force user = root
   force group = root
   create mask = 0664
   directory mask = 0775
   valid users = tiger, lynx
   write list = tiger
   guest ok = no
[pub]
   path = /smb/pub
   comment = Public Directory (Read Only)
   browseable = yes
   read only = yes
   guest ok = yes
   invalid users = lion
[incoming]
   path = /smb/incoming
   comment = Incoming Directory (Writeable)
   browseable = yes
   writable = yes
   valid users = tiger, lion
   create mask = 0666
   directory mask = 0777
   guest ok = no
